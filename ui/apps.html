<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application Portal — KalpanaOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="qrcode.js"></script>
  <style>
    body {
      padding: 40px 20px;
      max-width: 1200px;
      margin: 0 auto;
      background: var(--bg-base);
      color: var(--text-primary);
    }
    .portal-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .portal-header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .portal-header p {
      color: var(--text-muted);
      font-size: 1rem;
      max-width: 600px;
      margin: 0 auto;
    }
    .filter-tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
    }
    .filter-tab {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-surface);
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .filter-tab:hover {
      border-color: var(--border-bright);
      color: var(--text-primary);
    }
    .filter-tab.active {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
    }
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      margin-top: 20px;
    }
    .app-card {
      display: flex;
      flex-direction: column;
      height: 100%;
      border-radius: var(--radius);
      padding: 24px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .app-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.03);
    }
    .app-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .app-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .app-info {
      flex-grow: 1;
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px dashed var(--border);
      padding-bottom: 4px;
    }
    .info-row span:last-child {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
    }
    .app-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .qr-container {
      margin-top: 15px;
      padding: 12px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .qr-container canvas {
      display: block;
    }
    .qr-container span {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: var(--bg-surface);
      color: var(--text-muted);
    }
    .brand-footer {
      text-align: center;
      margin-top: 80px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="portal-header">
    <h1>Sovereign App Store</h1>
    <p>Install and launch applications hosted directly on the KalpanaOS Edge Server.</p>
  </div>

  <div class="filter-tabs">
    <button class="filter-tab active" data-filter="all">All Platforms</button>
    <button class="filter-tab" data-filter="web">Web Portal</button>
    <button class="filter-tab" data-filter="android">Android (APK)</button>
    <button class="filter-tab" data-filter="ios">iOS (OTA)</button>
  </div>

  <div class="apps-grid" id="apps-container">
    <div class="empty-state">Loading applications from edge node...</div>
  </div>

  <div class="brand-footer">
    ⚛ Powered by KalpanaOS Local Cloud Core · Home Server Edition
  </div>

  <script>
    let allApps = [];
    let publicTunnelURL = '';
    const container = document.getElementById('apps-container');

    async function fetchApps() {
      try {
        const response = await fetch('/api/col/apps/portal/list');
        if (!response.ok) throw new Error('API fetch failed');
        const data = await response.json();
        
        if (Array.isArray(data)) {
          allApps = data;
          publicTunnelURL = '';
        } else {
          allApps = data.apps || [];
          publicTunnelURL = data.public_tunnel_url || '';
        }
        
        renderApps('all');
      } catch (err) {
        container.innerHTML = `<div class="empty-state" style="color:var(--red)">✕ Failed to load applications from edge node: ${err.message}</div>`;
      }
    }

    function renderApps(filter) {
      const filtered = allApps.filter(app => filter === 'all' || app.platform === filter);
      
      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state">No applications found for platform "${filter}".</div>`;
        return;
      }

      container.innerHTML = filtered.map(app => {
        let badgeClass = 'badge-blue';
        if (app.platform === 'android') badgeClass = 'badge-amber';
        if (app.platform === 'ios') badgeClass = 'badge-purple';

        let detailsHTML = '';
        let actionHTML = '';

        if (!app.latest_build_id) {
          detailsHTML = `<div class="empty-row" style="text-align:center;font-size:0.8rem;color:var(--text-muted);margin:10px 0">No successful builds yet.</div>`;
          actionHTML = `<button class="btn btn-ghost btn-full" disabled>Not Compiled</button>`;
        } else {
          const buildDate = new Date(app.completed_at).toLocaleString();
          detailsHTML = `
            <div class="info-row"><span>Build ID</span><span>${app.latest_build_id.substring(0, 10)}</span></div>
            <div class="info-row"><span>Updated</span><span>${buildDate}</span></div>
          `;

          if (app.platform === 'web') {
            const hostIP = window.location.hostname;
            const hostPort = window.location.port ? `:${window.location.port}` : '';
            
            // 1. Resolve Local URL
            let localAppURL = `/api/col/apps/web/${app.id}/`;
            if (app.domain) {
              localAppURL = `http://${app.domain}${hostPort}`;
            } else if (hostIP !== 'localhost' && hostIP !== '127.0.0.1') {
              localAppURL = `http://${app.id}.${hostIP}.nip.io${hostPort}`;
            }
            
            // 2. Resolve Public Tunnel URL
            let publicAppURL = '';
            const isPublicTunnel = hostIP.endsWith('.trycloudflare.com') || hostIP.endsWith('.lhr.life');
            if (isPublicTunnel) {
              publicAppURL = window.location.origin + `/api/col/apps/web/${app.id}/`;
            } else if (publicTunnelURL) {
              publicAppURL = `${publicTunnelURL}/api/col/apps/web/${app.id}/`;
            }
            
            // 3. Render display details
            let displayURLHTML = `<div class="info-row"><span>Local URL</span><span>${app.domain || `${app.id}.[IP].nip.io`}</span></div>`;
            if (publicAppURL) {
              displayURLHTML += `<div class="info-row"><span>Public URL</span><span style="font-size:0.72rem"><a href="${publicAppURL}" target="_blank" style="color:var(--accent);text-decoration:underline">${publicAppURL.replace('https://', '')}</a></span></div>`;
            }
            
            detailsHTML += displayURLHTML;
            actionHTML = `<a href="${publicAppURL || localAppURL}" target="_blank" class="btn btn-primary btn-full">🚀 Launch Web App</a>`;
          } else if (app.platform === 'android') {
            const downloadURL = `${window.location.origin}/api/col/apps/downloads/${app.latest_build_id}/${app.artifact_file}`;
            actionHTML = `
              <a href="${downloadURL}" class="btn btn-primary btn-full">📥 Download APK File</a>
              <button class="btn btn-ghost btn-full" onclick="toggleQR('${app.id}', '${downloadURL}', 'Scan to download APK')">📱 Show QR Code</button>
              <div id="qr-${app.id}" class="qr-container hidden"></div>
            `;
          } else if (app.platform === 'ios') {
            // iOS OTA Install URL (must be HTTPS to trigger manifest, but we generate dynamic HTTP/HTTPS link)
            const gatewayProto = window.location.protocol;
            const manifestURL = `${window.location.origin}/api/col/apps/downloads/${app.latest_build_id}/manifest.plist`;
            const installURL = `itms-services://?action=download-manifest&url=${encodeURIComponent(manifestURL)}`;
            const ipaURL = `${window.location.origin}/api/col/apps/downloads/${app.latest_build_id}/${app.artifact_file}`;
            actionHTML = `
              <a href="${installURL}" class="btn btn-primary btn-full">⚡ Install App (OTA)</a>
              <a href="${ipaURL}" class="btn btn-ghost btn-full">📥 Download IPA File</a>
              <button class="btn btn-ghost btn-full" onclick="toggleQR('${app.id}', '${installURL}', 'Scan with iPhone Camera to Install')">📱 Show Installation QR</button>
              <div id="qr-${app.id}" class="qr-container hidden"></div>
            `;
          }
        }

        return `
          <div class="app-card glass">
            <div class="app-card-header">
              <span class="app-title">${app.name}</span>
              <span class="badge ${badgeClass}">${app.platform}</span>
            </div>
            <div class="app-info">
              <div class="info-row"><span>Git Repository</span><span>${app.git_repo.split('/').pop().replace('.git', '')}</span></div>
              ${detailsHTML}
            </div>
            <div class="app-actions">
              ${actionHTML}
            </div>
          </div>
        `;
      }).join('');
    }

    function toggleQR(appId, url, label) {
      const qrDiv = document.getElementById(`qr-${appId}`);
      if (!qrDiv) return;

      if (!qrDiv.classList.contains('hidden')) {
        qrDiv.classList.add('hidden');
        qrDiv.innerHTML = '';
        return;
      }

      // Hide all other QR containers first
      document.querySelectorAll('.qr-container').forEach(el => {
        el.classList.add('hidden');
        el.innerHTML = '';
      });

      qrDiv.classList.remove('hidden');
      qrDiv.innerHTML = `
        <canvas id="canvas-${appId}"></canvas>
        <span>${label}</span>
      `;

      const canvas = document.getElementById(`canvas-${appId}`);
      QRCode.toCanvas(canvas, url, { width: 160, margin: 1 }, function (error) {
        if (error) console.error(error);
      });
    }

    // Bind Filter Tabs
    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', (e) => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        renderApps(e.target.dataset.filter);
      });
    });

    fetchApps();
  </script>
</body>
</html>
