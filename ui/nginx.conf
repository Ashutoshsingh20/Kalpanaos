# ─── Nginx Gateway Reverse Proxy Configuration ───

# 1. Local Management Dashboard Server Block
server {
    listen 80;
    server_name localhost 127.0.0.1 192.168.1.9 kalpana.local ~^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+\.nip\.io$;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # Serve the SPA (Default Dashboard)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend services
    location /api/sil/ {
        proxy_pass http://sil:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /api/col/ {
        proxy_pass http://col:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /api/ssi/ {
        proxy_pass http://ssi:8003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /api/aicp/ {
        proxy_pass http://aicp:8004/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 180s;
    }

    location /api/aaf/ {
        proxy_pass http://aaf:8005/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Phase 3: Orchestrator
    location /api/orchestrator/ {
        proxy_pass http://orchestrator:8006/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
    }

    # Phase 6: CBAL Analytics
    location /api/cbal/ {
        proxy_pass http://cbal:8010/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 900s;
    }
}

# 2. Public Tunnel Server Block (CLI APIs, downloads, and app registry APIs only)
server {
    listen 80;
    server_name ~^[a-zA-Z0-9-]+\.trycloudflare\.com$ ~^[a-zA-Z0-9-]+\.lhr\.life$;
    root /usr/share/nginx/html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # Block public access to the main dashboard and landing UI
    location = / {
        return 403 "Forbidden: KalpanaOS Administrative Console is local-only.\n";
    }
    location = /index.html {
        return 403 "Forbidden: KalpanaOS Administrative Console is local-only.\n";
    }
    location = /dashboard.html {
        return 403 "Forbidden: KalpanaOS Administrative Console is local-only.\n";
    }

    # Allow downloading installer and CLI binary from the tunnel
    location = /install.sh {
        try_files /install.sh =404;
    }
    location ~ ^/kalpana {
        try_files $uri =404;
    }

    # Proxy API calls to backend services (protected by SIL tokens)
    location /api/sil/ {
        proxy_pass http://sil:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /api/col/ {
        proxy_pass http://col:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /api/ssi/ {
        proxy_pass http://ssi:8003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /api/aicp/ {
        proxy_pass http://aicp:8004/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 180s;
    }

    location /api/aaf/ {
        proxy_pass http://aaf:8005/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /api/orchestrator/ {
        proxy_pass http://orchestrator:8006/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
    }

    location /api/cbal/ {
        proxy_pass http://cbal:8010/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 900s;
    }

    # Everything else on the tunnel returns 404
    location / {
        return 404;
    }
}

# 3. Catch-All Server Block for Wildcard Subdomains and Custom Domains
server {
    listen 80 default_server;
    server_name _;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # Forward custom domains and subdomains to the Go collector domain resolver
    location / {
        proxy_pass http://col:8002/apps/web/serve$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
